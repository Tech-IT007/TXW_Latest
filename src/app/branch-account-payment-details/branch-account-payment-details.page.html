<ion-header>
  <ion-toolbar style="--background:#027dc1; --color:#fff">
        <ion-buttons slot="start">
      <ion-back-button style="color: #fff;"></ion-back-button>
    </ion-buttons>
    <ion-title>Payment Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="details-bg">

  <!-- Payment Info Card -->
  <ion-card class="details-card">
    <h2>{{ payment.StoreName }}</h2>

    <div class="info-row">
      <span>Amount</span>
      <strong>₹ {{ payment.Amount }}</strong>
    </div>

    <div class="info-row">
      <span>Date</span>
      <strong>{{ payment.CreatedDate }}</strong>
    </div>

    <div class="info-row">
      <span>Time</span>
      <strong>{{ payment.CreatedTime }}</strong>
    </div>
  </ion-card>

  <!-- Bill Image -->
  <ion-card class="image-card" *ngIf="payment.BillImage">
    <div class="img-title">Bill Image</div>
    <img [src]="payment.BillImage" />
  </ion-card>

  <!-- QR Image -->
  <ion-card class="image-card" *ngIf="payment.QrImage">
    <div class="img-title">QR Code</div>
    <img [src]="payment.QrImage" />
  </ion-card>

</ion-content>
