<ion-header>
  <ion-toolbar style="--background: #0c7cbc; --color: #fff;">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Payment</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="payment-bg">

  <div class="payment-card">

    <!-- Payment Type -->
    <div class="field">
      <label>Payment Type</label>
      <ion-select [(ngModel)]="dataToSend.PaymentType" placeholder="Select Payment Type">
        <ion-select-option value="Visit Charge">Visit Charge</ion-select-option>
        <ion-select-option value="Material Cost">Material Cost</ion-select-option>
        <ion-select-option value="Labour Cost">Labour Cost</ion-select-option>
      </ion-select>
    </div>

    <!-- Name -->
    <div class="field">
      <label>Name</label>
      <ion-input [(ngModel)]="dataToSend.Store" placeholder="Enter store name"></ion-input>
    </div>

    <!-- Amount -->
    <div class="field">
      <label>Amount</label>
      <ion-input type="number" [(ngModel)]="dataToSend.Amount" placeholder="Enter amount"></ion-input>
    </div>

    <!-- Phone -->
    <div class="field">
      <label>Mobile Number</label>
      <ion-input type="text" [(ngModel)]="dataToSend.PhoneNumber" placeholder="Enter mobile number"></ion-input>
    </div>

    <!-- Bill Images -->
    <div class="upload-box">
      <div class="upload-header">
        <span>Bill Images (Max 3)</span>
        <ion-button size="small" (click)="captureBillImage()">Upload</ion-button>
      </div>

      <div *ngFor="let img of billImages">
        <img [src]="img" class="preview-img" />
      </div>
    </div>

    <!-- QR Image -->
    <div class="upload-box">
      <div class="upload-header">
        <span>QR Code Image (Only 1)</span>
        <ion-button size="small" (click)="captureQRImage()">Upload</ion-button>
      </div>

      <div *ngIf="qrImage">
        <img [src]="qrImage" class="preview-img" />
      </div>
    </div>

    <!-- Schedule Date -->
    <div class="upload-box">
      <div class="upload-header">
        <span>Schedule Date</span>

        <ion-datetime-button datetime="scheduleDate"></ion-datetime-button>

        <ion-modal keep-contents-mounted="true">
          <ng-template>
            <ion-datetime
              id="scheduleDate"
              presentation="date"
              [(ngModel)]="dataToSend.ScheduleDate">
            </ion-datetime>
          </ng-template>
        </ion-modal>

      </div>
    </div>

  </div>

  <ion-button expand="block" class="submit-btn" (click)="submitPayment()">
    Submit Payment
  </ion-button>

</ion-content>
