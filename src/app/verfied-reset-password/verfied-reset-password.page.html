<ion-header>
  <ion-toolbar class="header">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Verification Code</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Logo -->
  <div class="logo-container">
    <img src="/assets/img/logo.jpg" alt="Company Logo" class="logo" />
  </div>

  <!-- Title -->
  <div class="title-box">
    <h2>Verification Code</h2>
    <p>Enter the 4 digit code sent to your mobile</p>
  </div>

  <!-- OTP -->
  <div class="otp-container">

    <input
      #txt1
      type="number"
      maxlength="1"
      class="otp-input"
      [(ngModel)]="userdetails.otp1"
      (keyup)="move($event,'', txt1, txt2)"
    />

    <input
      #txt2
      type="number"
      maxlength="1"
      class="otp-input"
      [(ngModel)]="userdetails.otp2"
      (keyup)="move($event, txt1, txt2, txt3)"
    />

    <input
      #txt3
      type="number"
      maxlength="1"
      class="otp-input"
      [(ngModel)]="userdetails.otp3"
      (keyup)="move($event, txt2, txt3, txt4)"
    />

    <input
      #txt4
      type="number"
      maxlength="1"
      class="otp-input"
      [(ngModel)]="userdetails.otp4"
      (keyup)="move($event, txt3, txt4, '')"
    />

  </div>

  <!-- Button -->
  <ion-button expand="block" class="verify-btn" (click)="submit()">
    VERIFY NOW
  </ion-button>

</ion-content>
