<ion-header class="header">
  <ion-toolbar class="header-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/vendor-new-page" icon="arrow-back-outline" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="header-title">Attendance Punch-IN</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="punch-in-page">

  <!-- Time & Location Section -->
  <div class="info-section">
    <div class="info-card">
      <ion-icon name="time-outline" class="icon"></ion-icon>
      <div>
        <p class="label">Current Time</p>
        <p class="value">{{ currentTime }}</p>
      </div>
    </div>

    <div class="info-card">
      <ion-icon name="location-outline" class="icon"></ion-icon>
      <div>
        <p class="label">Location</p>
        <p class="value">{{address}}</p>
      </div>
    </div>
  </div>

  <!-- Camera Section -->
  <div class="camera-section">
    <h2 class="section-title">Capture Your Photo</h2>

    <div class="image-preview" id="cameraPreview" *ngIf="clicked; else noImage">
      <img  [src]="clicked" alt="Captured" class="captured-img" />
    </div>

    <ng-template #noImage>
      <div class="image-placeholder">
        <ion-icon name="camera-outline" class="placeholder-icon"></ion-icon>
        <p>No Image Captured</p>
      </div>
    </ng-template>

    <ion-button expand="block" class="primary-btn" (click)="capture()">
      <ion-icon name="camera"></ion-icon>
      Capture Photo
    </ion-button>
  </div>

  <!-- Submit Attendance Button -->
  <ion-button
    expand="block"
    class="primary-btn submit-btn"
    [disabled]="!clicked"
    (click)="attdence_in()">
    <ion-icon name="checkmark-circle-outline"></ion-icon>
    Submit Attendance
  </ion-button>

</ion-content>
