<ion-header>
  <ion-toolbar style="--background: #0c7cbc; --color: #fff;">
    <ion-buttons slot="start">
      <ion-back-button style="color: #fff;"></ion-back-button>
    </ion-buttons>
    <ion-title>Client Contact</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <!-- Logo -->
  <div class="logo-container">
    <img src="/assets/img/logo.jpg" alt="Company Logo" class="logo" />
  </div>

  <ion-card class="form-card">
    <!-- Countdown + Blink Box -->
<!-- <div class="timeout-box" *ngIf="countdown > 0">
  ⏳ Waiting for feedback...
  <strong>{{ countdown }}s</strong> left
</div> -->
    <ion-card-header>
      <ion-card-title>Submit Feedback Contact</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <!-- Phone Number Input -->
      <ion-item>
        <ion-label position="floating">Phone Number</ion-label>
        <ion-input
          type="tel"
          maxlength="10"
          [(ngModel)]="dataTosend.phonenumber"
          required
        ></ion-input>
      </ion-item>

      <!-- Submit Button -->
      <ion-button expand="block" class="submit-btn" (click)="sendFeedback()">
        Submit
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
