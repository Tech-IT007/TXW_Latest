<ion-content class="popup-content">
  <div class="popup-card" *ngIf="popupData">
    <!-- ❌ Close button -->
    <ion-icon
      name="close-circle"
      class="close-btn"
      (click)="closeModal()"
    ></ion-icon>

    <!-- Banner -->
    <img [src]="popupData.banner" alt="Popup Banner" class="popup-banner" />

    <!-- Title -->
    <h2 class="popup-title">{{ popupData.title }}</h2>

    <!-- Message -->
    <p class="popup-message">{{ popupData.message }}</p>

    <!-- CTA Button -->
    <ion-button expand="block" color="warning" (click)="closeModal()">
      {{ popupData.cta_text }}
    </ion-button>
  </div>
</ion-content>
